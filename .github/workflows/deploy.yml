name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    name: Unit & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: "npm"

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm test

